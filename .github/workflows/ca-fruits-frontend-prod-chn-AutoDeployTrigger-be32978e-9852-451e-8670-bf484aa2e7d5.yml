name: Trigger auto deployment for ca-fruits-frontend-prod-chn

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-fruits-frontend-prod-chn-AutoDeployTrigger-be32978e-9852-451e-8670-bf484aa2e7d5.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAFRUITSFRONTENDPRODCHN_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAFRUITSFRONTENDPRODCHN_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAFRUITSFRONTENDPRODCHN_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.CAFRUITSFRONTENDPRODCHN_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAFRUITSFRONTENDPRODCHN_REGISTRY_PASSWORD }}
          containerAppName: ca-fruits-frontend-prod-chn
          resourceGroup: rg-fruits-prod-chn
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


